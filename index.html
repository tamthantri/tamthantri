<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tâm Thân Trí AI - Phân Tích Đông Y</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1e3d2f; margin-bottom: 30px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 100px; resize: none; }
        button { width: 100%; padding: 14px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; margin-top: 15px; }
        button:hover { background-color: #219a52; }
        .result-box { margin-top: 30px; padding: 20px; background: #f9f9f9; border-left: 5px solid #27ae60; border-radius: 6px; display: none; }
        .result-title { font-size: 18px; font-weight: bold; color: #1e3d2f; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .loading { text-align: center; color: #7f8c8d; font-style: italic; display: none; margin-top: 20px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tâm Thân Trí AI · Hệ Thống Khảo Sát</h1>
    
    <div class="form-group">
        <label>Năm sinh (Để tính Ngũ vận lục khí):</label>
        <input type="number" id="birthYear" placeholder="Ví dụ: 1984" value="1984">
    </div>

    <div class="form-group">
        <label>Triệu chứng hoặc băn khoăn sức khỏe hiện tại:</label>
        <textarea id="symptoms" placeholder="Hãy chia sẻ chi tiết về tình trạng mệt mỏi, tiêu hóa, giấc ngủ hoặc cảm xúc của thầy..."></textarea>
    </div>

    <div class="form-group">
        <label>Ảnh lưỡi mặt trên (Chuỗi Base64 phòng hờ thử nghiệm):</label>
        <textarea id="tongueImage" placeholder="Dán chuỗi ảnh Base64 vào đây (nếu có), hoặc để trống..."></textarea>
    </div>

    <button onclick="startAnalysis()">Bắt đầu phân tích</button>

    <div id="loadingStatus" class="loading">Thầy đợi chút, hệ thống đang chẩn bệnh và lập phác đồ...</div>

    <div id="resultBox" class="result-box">
        <div class="result-title">🎯 Phác Đồ Đông Y Định Hướng Chi Tiết</div>
        <div id="analysisOutput"></div>
    </div>
</div>

<script>
    async function startAnalysis() {
        const birthYear = document.getElementById('birthYear').value;
        const symptoms = document.getElementById('symptoms').value;
        const tongueImg = document.getElementById('tongueImage').value;

        const loadingStatus = document.getElementById('loadingStatus');
        const resultBox = document.getElementById('resultBox');
        const output = document.getElementById('analysisOutput');

        if (!symptoms.trim()) {
            alert('Thầy vui lòng nhập triệu chứng sức khỏe trước khi test hệ thống nhé!');
            return;
        }

        // Hiện trạng thái loading, ẩn hộp kết quả cũ
        loadingStatus.style.display = 'block';
        resultBox.style.display = 'none';

        // Đóng gói cấu trúc dữ liệu chính xác theo yêu cầu của Worker v2.2
        const requestData = {
            profile: {
                birth_year: parseInt(birthYear),
                chief_complaint: symptoms
            },
            images: {
                tongue: tongueImg ? tongueImg.trim() : null
            }
        };

        try {
            // ĐƯỜNG DẪN WORKER CỦA THẦY - ĐÃ THÊM ĐUÔI /analyze ĐỂ PHÂN ĐỊNH ROUTING
            const workerUrl = 'https://tamthantri-ai.giaminhthaduoc.workers.dev/analyze';

            const response = await fetch(workerUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestData)
            });

            if (!response.ok) {
                throw new Error('Hệ thống phản hồi lỗi: ' + response.status);
            }

            const data = await response.json();
            loadingStatus.style.display = 'none';
            resultBox.style.display = 'block';

            // Đổ dữ liệu động từ JSON trả về ra màn hình một cách trực quan
            output.innerHTML = `
                <p><strong>Tổng điểm sức khỏe:</strong> ${data.total}/95</p>
                <p><strong>Bát cương biện chứng:</strong> ${data.batCuong}</p>
                <p><strong>Tạng phủ yếu nhất:</strong> ${data.weakest}</p>
                <hr>
                <p><strong>Lời khuyên của thầy:</strong><br>${data.summary}</p>
                <hr>
                <p><strong>Biện chứng chuyên môn:</strong><br>${data.binhchung}</p>
                <hr>
                <p><strong>Phác đồ & Lối sống:</strong></p>
                <pre>${data.rx}</pre>
            `;

        } catch (error) {
            loadingStatus.style.display = 'none';
            resultBox.style.display = 'block';
            output.innerHTML = `<span style="color: red; font-weight: bold;">Không thể kết nối đến hệ thống AI: ${error.message}. Thầy kiểm tra lại link Worker hoặc log lỗi trực tiếp trên Cloudflare nhé!</span>`;
        }
    }
</script>

</body>
</html>
