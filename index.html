<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tâm Thân Trí AI - Khảo Sát & Tứ Chẩn</title>
    <style>
        :root {
            --primary-color: #1e3d2f;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px; 
            color: var(--text-color); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 600px; 
            box-sizing: border-box;
        }
        h1 { 
            color: var(--primary-color); 
            text-align: center; 
            margin-bottom: 24px; 
            font-weight: 600; 
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
            font-size: 15px;
        }
        input[type="number"], textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            resize: none; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        textarea { 
            height: 100px; 
        }
        .upload-box {
            border: 1px dashed #cbd5e1;
            padding: 12px;
            border-radius: 8px;
            background: #f8f9fa;
            margin-top: 5px;
        }
        .preview-img {
            max-width: 100px;
            max-height: 100px;
            border-radius: 6px;
            display: none;
            margin-top: 8px;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 12px; 
            font-weight: bold; 
            transition: background 0.3s; 
        }
        button:hover { 
            background-color: #219a52; 
        }
        .loading { 
            color: #7f8c8d; 
            font-style: italic; 
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .result-box { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f9f9f9; 
            border-left: 4px solid var(--accent-color); 
            border-radius: 4px; 
            min-height: 50px; 
            color: #34495e; 
            display: none;
        }
        .result-section {
            margin-bottom: 15px;
        }
        .result-section h4 {
            margin: 0 0 5px 0;
            color: var(--primary-color);
            font-size: 16px;
        }
        .result-section p {
            margin: 0;
            line-height: 1.5;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tâm Thân Trí AI</h1>
    
    <div class="form-group">
        <label>Năm sinh:</label>
        <input type="number" id="birthYear" value="1984" placeholder="Ví dụ: 1984">
    </div>

    <div class="form-group">
        <label>Chia sẻ băn khoăn hoặc triệu chứng:</label>
        <textarea id="promptInput" placeholder="Hãy chia sẻ những băn khoăn của bạn về tâm lý, sức khỏe hoặc tư duy..."></textarea>
    </div>

    <div class="form-group">
        <label>Ảnh mặt trên của lưỡi (Tùy chọn):</label>
        <div class="upload-box">
            <input type="file" id="tongueFile" accept="image/*" onchange="previewImage(this, 'tonguePreview')">
            <img id="tonguePreview" class="preview-img" alt="Xem trước ảnh lưỡi">
        </div>
    </div>

    <button onclick="askAI()">Gửi Yêu Cầu</button>

    <div id="loading" class="loading">AI đang suy ngẫm, thầy vui lòng đợi chút...</div>

    <div id="result" class="result-box"></div>
</div>

<script>
    const imagePayload = { tongue: null };

    // Hàm mã hóa ảnh sang Base64 tự động ngầm
    function previewImage(input, previewId) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgElement = document.getElementById(previewId);
                imgElement.src = e.target.result;
                imgElement.style.display = 'block';
                imagePayload.tongue = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    async function askAI() {
        const birthYear = document.getElementById('birthYear').value;
        const prompt = document.getElementById('promptInput').value;
        
        const loadingDiv = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        
        if (!prompt.trim()) {
            alert('Vui lòng nhập nội dung triệu chứng!');
            return;
        }

        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';

        // Đóng gói đúng cấu trúc Profile dữ liệu lớn cho bản v2.2
        const payload = {
            profile: {
                birth_year: parseInt(birthYear),
                chief_complaint: prompt
            },
            images: {
                tongue: imagePayload.tongue
            }
        };

        try {
            const workerUrl = 'https://tamthantri-ai.giaminhthaduoc.workers.dev/analyze'; 

            const response = await fetch(workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error('Lỗi từ Worker: ' + response.status);
            }

            const data = await response.json();
            loadingDiv.style.display = 'none';
            resultDiv.style.display = 'block';

            // Dàn trang hiển thị cấu trúc mượt mà, chuyên nghiệp ngay trong khung tối giản
            resultDiv.innerHTML = `
                <div class="result-section">
                    <h4>🎯 ĐỊNH HƯỚNG TỔNG QUAN</h4>
                    <p><strong>Điểm số:</strong> ${data.total || 70}/95 | <strong>Bát cương:</strong> ${data.batCuong || 'Chưa định danh'}</p>
                    <p style="margin-top: 5px;">${data.summary || ''}</p>
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="result-section">
                    <h4>⚖️ BIỆN CHỨNG LUẬN TRỊ</h4>
                    <p>${data.binhchung || ''}</p>
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="result-section">
                    <h4>📋 PHÁC ĐỒ DƯỠNG SINH GỢI Ý</h4>
                    <p>${data.rx || ''}</p>
                </div>
            `;

        } catch (error) {
            loadingDiv.style.display = 'none';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `<span style="color: #e74c3c; font-weight: bold;">Hệ thống gặp gián đoạn: ${error.message}. Thầy kiểm tra lại Live Logs trên Cloudflare nhé!</span>`;
        }
    }
</script>

</body>
</html>
